name: realio-mainnet

on:
  push:
    branches:
      - chains/realio
    paths:
      - '*'
      - '**'
      - '!.github/**'
      - '!README.md'
      - '!.gitignore'
  workflow_dispatch:

jobs:
  build:
    runs-on: [ubuntu-latest]
    environment: realio-mainnet
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Login to Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ secrets.IMAGE_REGISTRY_URL }}
          username: ${{ secrets.IMAGE_REGISTRY_USER }}
          password: ${{ secrets.ACCESS_TOKEN }}
      - name: GitHub Actions Cache Docker layers
        uses: actions/cache@6f8efc29b200d32929f49075959781ed54ec270c # v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ github.workflow }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ github.workflow }}-buildx-${{ github.sha }}
            ${{ github.workflow }}
      - name: Build and push
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          push: true
          tags: ${{ secrets.IMAGE_REGISTRY_URL }}/${{ secrets.IMAGE_REPO }}/${{ secrets.IMAGE_NAME }}:${{ github.sha }}-${{ github.run_number }}
          file: Dockerfile.mainnet
          cache-from: type=gha
          cache-to: type=gha,mode=max
  update-gitops:
    needs: build
    environment: realio-mainnet
    runs-on: [ubuntu-latest]
    steps:
    - name: Checkout gitops repository
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        token: ${{ secrets.GITOPS_PAT }}
        repository: ${{ secrets.GITOPS_REPO }}
        ref: main
    - name: Update manifest
      run: |
        if cat ${{ secrets.MANIFEST_PATH }} | grep ${{ github.sha }}-${{ github.run_number }}; then
          echo "Image tag already exists in the manifest"
          exit 0
        fi
        sed -i 's|image: .*$|image: '"${{ secrets.IMAGE_REGISTRY_URL }}/${{ secrets.IMAGE_REPO }}/${{ secrets.IMAGE_NAME }}:${{ github.sha }}-${{ github.run_number }}"'|' ${{ secrets.MANIFEST_PATH }}
        git config user.name 'github-actions-bot'
        git config user.email '${{ secrets.IMAGE_REGISTRY_USER }}'
        git add .
        git commit -m 'Update image tag to ${{ github.sha }}-${{ github.run_number }}'
        git pull --rebase
        git push
    env:
      GITHUB_TOKEN: ${{ secrets.GITOPS_PAT }}