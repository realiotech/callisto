name: realio-mainnet

on:
  push:
    branches:
      - chains/realio
    paths:
      - '*'
      - '**'
      - '!.github/**'
      - '!README.md'
      - '!.gitignore'
  workflow_dispatch:

jobs:
  build:
    runs-on: [ubuntu-latest]
    environment: realio-mainnet
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.IMAGE_REGISTRY_URL }}
          username: ${{ secrets.IMAGE_REGISTRY_USER }}
          password: ${{ secrets.ACCESS_TOKEN }}
      - name: GitHub Actions Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ github.workflow }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ github.workflow }}-buildx-${{ github.sha }}
            ${{ github.workflow }}-buildx-
            ${{ github.workflow }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ${{ secrets.IMAGE_REGISTRY_URL }}/${{ secrets.IMAGE_REPO }}/${{ secrets.IMAGE_NAME }}:${{ github.sha }}
          file: Dockerfile.mainnet
          cache-from: type=gha
          cache-to: type=gha,mode=max
  update-gitops:
    needs: build
    environment: realio-mainnet
    runs-on: [ubuntu-latest]
    steps:
    - name: Checkout gitops repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITOPS_PAT }}
        repository: ${{ secrets.GITOPS_REPO }}
        ref: main
    - name: Update manifest
      run: |
        if cat ${{ secrets.MANIFEST_PATH }} | grep ${{ github.sha }}; then
          echo "Image tag already exists in the manifest"
          exit 0
        fi
        sed -i 's|image: .*$|image: '"${{ secrets.IMAGE_REGISTRY_URL }}/${{ secrets.IMAGE_REPO }}/${{ secrets.IMAGE_NAME }}:${{ github.sha }}"'|' ${{ secrets.MANIFEST_PATH }}
        git config user.name 'github-actions-bot'
        git config user.email '${{ secrets.IMAGE_REGISTRY_USER }}'
        git add .
        git commit -m 'Update image tag to ${{ github.sha }}'
        git push
    env:
      GITHUB_TOKEN: ${{ secrets.GITOPS_PAT }}